<!DOCTYPE html>
<html>

<head>

<title>Fake News Detector</title>

<link rel="stylesheet"
href="{{ url_for('static',filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>Fake News Detection</h1>

<form action="/predict" method="POST">

<textarea
name="news"
rows="10"
placeholder="Paste News Here..."
required></textarea>

<button>Check News</button>

</form>

{% if prediction %}

<h2>Result : {{ prediction }}</h2>

{% endif %}

</div>

</body>

</html>
